apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ required ".Values.clusterRole.name is required" .Values.clusterRole.name }}
  labels:
{{- include "operator.clusterrole.labels" . | nindent 4 }}
rules:
- apiGroups:
  - scheduler.grove.io
  resources:
  - podgangs
  - podgangs/status
  verbs:
  - create
  - get
  - list
  - watch
  - delete
  - deletecollection
  - patch
  - update
- apiGroups:
  - grove.io
  resources:
  - podcliquesets
  - podcliquesets/status
  - podcliques
  - podcliques/status
  - podcliquescalinggroups
  - clustertopologies
  - podcliquescalinggroups/status
  verbs:
  - create
  - get
  - list
  - watch
  - delete
  - deletecollection
  - patch
  - update
- apiGroups:
  - ""
  resources:
  - nodes
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - ""
  resources:
  - pods
  - pods/status
  - serviceaccounts
  - services
  - secrets
  verbs:
  - create
  - get
  - list
  - watch
  - delete
  - deletecollection
  - patch
  - update
- apiGroups:
    - ""
  resources:
    - secrets
  verbs:
    - create
    - get
    - list
    - patch
    - delete
    - watch
    - update
- apiGroups:
  - admissionregistration.k8s.io
  resources:
  - validatingwebhookconfigurations
  - mutatingwebhookconfigurations
  verbs:
  - get
  - list
  - watch
  - update
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - create
  - get
  - list
  - watch
  - patch
- apiGroups:
    - ""
  resources:
    - secrets
  verbs:
    - create
    - get
    - list
    - patch
    - delete
    - watch
- apiGroups:
  - rbac.authorization.k8s.io
  resources:
  - roles
  - rolebindings
  verbs:
  - create
  - get
  - list
  - watch
  - delete
- apiGroups:
  - autoscaling
  resources:
  - horizontalpodautoscalers
  verbs:
  - create
  - get
  - list
  - delete
  - deletecollection
  - patch
  - update
  - watch
- apiGroups:
  - kai.scheduler
  resources:
  - topologies
  verbs:
  - create
  - get
  - list
  - watch
  - patch
  - update
  - delete
# DRA (Dynamic Resource Allocation) integration for resource sharing
- apiGroups:
  - resource.k8s.io
  resources:
  - resourceclaims
  verbs:
  - create
  - get
  - list
  - watch
  - delete
  - deletecollection
  - patch
  - update
- apiGroups:
  - resource.k8s.io
  resources:
  - resourceclaimtemplates
  verbs:
  - get
  - list
  - watch
{{- if .Values.config.network.autoMNNVLEnabled }}
# MNNVL (Multi-Node NVLink) support requires permissions for ComputeDomain and ResourceClaimTemplate resources.
# Note: Kubernetes allows RBAC rules for resources that don't exist yet. If the ComputeDomain CRD is not installed,
# the operator's preflight check will fail-fast with a clear error message before attempting to use these permissions.
#
# ComputeDomain resources (from NVIDIA DRA driver)
- apiGroups:
  - resource.nvidia.com
  resources:
  - computedomains
  verbs:
  - create
  - get
  - list
  - watch
  - delete
  - patch
  - update
# ResourceClaimTemplates write access for MNNVL
- apiGroups:
  - resource.k8s.io
  resources:
  - resourceclaimtemplates
  verbs:
  - create
  - delete
  - patch
  - update
{{- end }}
# koord-scheduler backend requires permissions to manage Koordinator PodGroup CRs.
# Note: Kubernetes allows RBAC rules for resources that don't exist yet. If the Koordinator
# PodGroup CRD is not installed, this rule is simply unused and causes no errors.
- apiGroups:
  - scheduling.sigs.k8s.io
  resources:
  - podgroups
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
{{- if .Values.crdInstaller.enabled }}
# CRD installer init container requires permissions to apply Grove CRDs on startup.
- apiGroups:
  - apiextensions.k8s.io
  resources:
  - customresourcedefinitions
  resourceNames:
  - podcliquesets.grove.io
  - podcliques.grove.io
  - podcliquescalinggroups.grove.io
  - clustertopologies.grove.io
  - podgangs.scheduler.grove.io
  verbs:
  - get
  - create
  - update
  - patch
{{- end }}

